<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Dashboard — 14 Repos</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface-2: #1c2129; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --orange: #db6d28;
    --purple: #bc8cff; --cyan: #39d2c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

  .header { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .sys-info { margin-left: auto; display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); align-items: center; }
  .header .sys-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border);
    font-size: 11px; font-variant-numeric: tabular-nums;
  }
  .header .sys-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 32px; }
  .tab { padding: 10px 16px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0 6px; font-size: 11px; }

  .content { padding: 24px 32px; }

  /* Scan Summary Banner */
  .scan-banner { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .scan-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 20px; min-width: 120px; text-align: center;
  }
  .scan-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; }
  .scan-card .value { font-size: 24px; font-weight: 700; }
  .scan-card.p0 .value { color: var(--red); }
  .scan-card.p1 .value { color: var(--orange); }
  .scan-card.p2 .value { color: var(--yellow); }
  .scan-card.resolved .value { color: var(--green); }
  .scan-card.total .value { color: var(--text); }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }

  /* Repo Grid */
  .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .repo-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; transition: border-color 0.15s;
  }
  .repo-card:hover { border-color: var(--accent); }
  .repo-card .name { font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .repo-card .desc { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.4; }
  .repo-card .meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500;
  }
  .badge-tech { background: #1f2937; color: var(--purple); border: 1px solid #374151; }
  .badge-clean { background: #0d2818; color: var(--green); border: 1px solid #1a4731; }
  .badge-dirty { background: #3d1a00; color: var(--orange); border: 1px solid #5c2800; }
  .badge-branch { background: #1c2333; color: var(--accent); border: 1px solid #2d3748; }
  .badge-port { background: #2d1b4e; color: var(--purple); border: 1px solid #4a2d7a; }
  .badge-issues { background: #3d1200; color: var(--red); border: 1px solid #5c1a00; }

  .repo-card .commit { font-size: 12px; color: var(--text-dim); margin-top: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .repo-card .actions { margin-top: 12px; display: flex; gap: 8px; }
  .btn {
    padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .btn.running { border-color: var(--yellow); color: var(--yellow); cursor: wait; }
  .btn.pass { border-color: var(--green); color: var(--green); }
  .btn.fail { border-color: var(--red); color: var(--red); }

  /* Services */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .svc-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; position: relative; overflow: hidden;
  }
  .svc-card.svc-running { border-color: var(--green); }
  .svc-card.svc-stopped { border-color: var(--border); }
  .svc-card .svc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .svc-card .svc-icon { font-size: 28px; }
  .svc-card .svc-name { font-size: 16px; font-weight: 600; }
  .svc-card .svc-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
  .svc-card .svc-status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .svc-card .svc-status .dot { width: 8px; height: 8px; border-radius: 50%; }
  .svc-card .svc-status .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .svc-card .svc-status .dot.red { background: var(--red); }
  .svc-card .svc-status .dot.yellow { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .svc-card .svc-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
  .svc-card .svc-meta span { display: flex; align-items: center; gap: 4px; }
  .svc-card .svc-actions { display: flex; gap: 8px; }
  .btn-start { background: #0d281840; border-color: var(--green); color: var(--green); }
  .btn-start:hover { background: #0d281880; }
  .btn-stop { background: #3d120040; border-color: var(--red); color: var(--red); }
  .btn-stop:hover { background: #3d120080; }
  .btn-open { background: #1c233340; border-color: var(--accent); color: var(--accent); }
  .btn-open:hover { background: #1c233380; }

  /* Log viewer */
  .log-viewer {
    background: #010409; border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; margin-top: 12px; max-height: 200px; overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 11px;
    line-height: 1.5;
  }
  .log-viewer:empty::after { content: 'No logs yet'; color: var(--text-dim); }
  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line.stdout { color: var(--text-dim); }
  .log-line.stderr { color: var(--orange); }
  .log-line.system { color: var(--cyan); font-style: italic; }

  /* Backlog */
  .backlog-table { width: 100%; border-collapse: collapse; }
  .backlog-table th { text-align: left; padding: 8px 12px; font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  .backlog-table td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .sev-P0 { color: var(--red); font-weight: 600; }
  .sev-P1 { color: var(--orange); font-weight: 600; }
  .sev-P2 { color: var(--yellow); font-weight: 600; }
  .sev-P3 { color: var(--text-dim); }
  .status-open { color: var(--red); }
  .status-resolved { color: var(--green); }
  .category-badge {
    display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .cat-security { background: #3d120050; color: var(--red); border: 1px solid #5c1a0060; }
  .cat-bug { background: #3d1a0050; color: var(--orange); border: 1px solid #5c280060; }
  .cat-quality { background: #2d1b4e50; color: var(--purple); border: 1px solid #4a2d7a60; }
  .cat-accessibility { background: #0d281850; color: var(--cyan); border: 1px solid #1a473160; }
  .cat-reliability { background: #1c233350; color: var(--accent); border: 1px solid #2d374860; }

  /* Detail panel */
  .detail-overlay {
    position: fixed; top: 0; right: 0; bottom: 0; width: 500px;
    background: var(--surface); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.2s; z-index: 100;
    overflow-y: auto; padding: 24px;
  }
  .detail-overlay.open { transform: translateX(0); }
  .detail-overlay h2 { font-size: 18px; margin-bottom: 16px; }
  .detail-overlay .close { position: absolute; top: 16px; right: 16px; cursor: pointer; color: var(--text-dim); font-size: 20px; background: none; border: none; }
  .detail-overlay .log-entry { font-size: 12px; font-family: 'SF Mono', monospace; color: var(--text-dim); padding: 4px 0; border-bottom: 1px solid var(--border); }

  .loading { text-align: center; padding: 48px; color: var(--text-dim); }

  @media (max-width: 768px) {
    .repo-grid, .services-grid { grid-template-columns: 1fr; }
    .content { padding: 16px; }
    .header { padding: 12px 16px; flex-wrap: wrap; }
    .detail-overlay { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Dev Dashboard</h1>
  <div class="sys-info">
    <span class="sys-pill"><span class="dot"></span> <span id="sysUptime">—</span></span>
    <span class="sys-pill" id="sysNode">—</span>
    <span class="sys-pill" id="sysMem">—</span>
    <span class="sys-pill" id="sysLoad">—</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="repos">Repositories <span class="count" id="repoTabCount">14</span></div>
  <div class="tab" data-tab="services">Services <span class="count" id="svcTabCount">—</span></div>
  <div class="tab" data-tab="scan">Security Scan</div>
  <div class="tab" data-tab="backlog">Backlog <span class="count" id="backlogTabCount">—</span></div>
</div>

<div class="content" id="content">
  <div class="loading">Loading repositories...</div>
</div>

<div class="detail-overlay" id="detailPanel">
  <button class="close" onclick="closeDetail()">&times;</button>
  <h2 id="detailTitle"></h2>
  <div id="detailContent"></div>
</div>

<script>
let repos = [];
let backlog = [];
let scanSummary = null;
let services = [];
let systemInfo = null;
let activeTab = 'repos';
let backlogFilter = 'all';
let logPollers = {};

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    render();
  });
});

async function fetchRepos() {
  try {
    const res = await fetch('/api/repos');
    repos = await res.json();
    document.getElementById('repoTabCount').textContent = repos.length;
    if (activeTab === 'repos') render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading">Error loading repos: ${escHtml(e.message)}</div>`;
  }
}

async function fetchBacklog() {
  try {
    const res = await fetch('/api/backlog');
    backlog = await res.json();
    const openCount = backlog.filter(b => b.status === 'open').length;
    document.getElementById('backlogTabCount').textContent = openCount + ' open';
  } catch (e) { /* ignore */ }
}

async function fetchScanSummary() {
  try {
    const res = await fetch('/api/scan-summary');
    scanSummary = await res.json();
  } catch (e) { /* ignore */ }
}

async function fetchServices() {
  try {
    const res = await fetch('/api/services');
    services = await res.json();
    const running = services.filter(s => s.status === 'running').length;
    document.getElementById('svcTabCount').textContent = running + '/' + services.length;
    if (activeTab === 'services') render();
  } catch (e) { /* ignore */ }
}

async function fetchSystemInfo() {
  try {
    const res = await fetch('/api/system');
    systemInfo = await res.json();
    updateSystemHeader();
  } catch (e) { /* ignore */ }
}

function updateSystemHeader() {
  if (!systemInfo) return;
  const s = systemInfo;
  const h = Math.floor(s.uptime / 3600);
  const m = Math.floor((s.uptime % 3600) / 60);
  document.getElementById('sysUptime').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
  document.getElementById('sysNode').textContent = s.nodeVersion;
  const memMB = Math.round(s.memory.rss / 1048576);
  document.getElementById('sysMem').textContent = memMB + ' MB';
  document.getElementById('sysLoad').textContent = 'load ' + s.loadAvg[0].toFixed(1);
}

function getRepoIssueCount(repoName) {
  return backlog.filter(b => b.repo === repoName && b.status === 'open').length;
}

function render() {
  const content = document.getElementById('content');
  if (activeTab === 'repos') {
    content.innerHTML = `<div class="repo-grid">${repos.map(renderCard).join('')}</div>`;
  } else if (activeTab === 'services') {
    content.innerHTML = renderServices();
  } else if (activeTab === 'scan') {
    content.innerHTML = renderScan();
  } else if (activeTab === 'backlog') {
    content.innerHTML = renderBacklog();
  }
}

function renderCard(repo) {
  const statusBadge = repo.status === 'clean'
    ? '<span class="badge badge-clean">● clean</span>'
    : repo.status === 'dirty'
    ? `<span class="badge badge-dirty">● ${repo.dirtyFiles} dirty</span>`
    : '<span class="badge badge-dirty">● error</span>';

  const issueCount = getRepoIssueCount(repo.name);
  const issueBadge = issueCount > 0
    ? `<span class="badge badge-issues">⚠ ${issueCount} issues</span>`
    : '';

  const portBadge = repo.port ? `<span class="badge badge-port">:${repo.port}</span>` : '';
  const healthBtn = repo.healthCmd
    ? `<button class="btn" onclick="runHealth('${escHtml(repo.name)}', this)">Run Health</button>`
    : '';

  return `
    <div class="repo-card">
      <div class="name">${escHtml(repo.name)}</div>
      <div class="desc">${escHtml(repo.description)}</div>
      <div class="meta">
        <span class="badge badge-tech">${escHtml(repo.tech)}</span>
        <span class="badge badge-branch">⎇ ${escHtml(repo.branch || '—')}</span>
        ${statusBadge}
        ${issueBadge}
        ${portBadge}
      </div>
      <div class="commit">${escHtml(repo.lastCommit || '')}</div>
      <div class="actions">
        <button class="btn" onclick="showLog('${escHtml(repo.name)}')">Log</button>
        ${healthBtn}
        <button class="btn" onclick="window.open('https://github.com/${escHtml(repo.owner)}/${escHtml(repo.name)}')">GitHub</button>
      </div>
    </div>
  `;
}

// ─── Services Tab ──────────────────────────────────────────────

function renderServices() {
  if (!services.length) return '<div class="loading">Loading services...</div>';
  return `<div class="services-grid">${services.map(renderServiceCard).join('')}</div>`;
}

function renderServiceCard(svc) {
  const isRunning = svc.status === 'running';
  const isSelf = svc.selfManaged;
  const dotClass = isRunning ? 'green' : 'red';
  const cardClass = isRunning ? 'svc-running' : 'svc-stopped';

  const uptimeStr = isRunning && svc.uptime > 0
    ? formatUptime(svc.uptime)
    : '—';

  const actions = isSelf
    ? `<button class="btn btn-open" onclick="window.open('http://localhost:${svc.port}')">Open :${svc.port}</button>`
    : isRunning
    ? `
      <button class="btn btn-stop" onclick="svcAction('${escHtml(svc.name)}', 'stop')">Stop</button>
      <button class="btn" onclick="svcAction('${escHtml(svc.name)}', 'restart')">Restart</button>
      <button class="btn btn-open" onclick="window.open('http://localhost:${svc.port}')">Open :${svc.port}</button>
      <button class="btn" onclick="toggleLogs('${escHtml(svc.name)}')">Logs</button>
    `
    : `
      <button class="btn btn-start" onclick="svcAction('${escHtml(svc.name)}', 'start')">Start</button>
    `;

  return `
    <div class="svc-card ${cardClass}">
      <div class="svc-header">
        <span class="svc-icon">${svc.icon || '📦'}</span>
        <span class="svc-name">${escHtml(svc.displayName)}</span>
      </div>
      <div class="svc-desc">${escHtml(svc.description)}</div>
      <div class="svc-status">
        <span class="dot ${dotClass}"></span>
        <span style="font-size:13px;font-weight:500">${isRunning ? 'Running' : 'Stopped'}</span>
        ${svc.pid ? `<span style="font-size:11px;color:var(--text-dim)">PID ${svc.pid}</span>` : ''}
      </div>
      <div class="svc-meta">
        <span>⏱ ${uptimeStr}</span>
        <span>🔌 :${svc.port || '—'}</span>
        ${svc.logLines ? `<span>📋 ${svc.logLines} lines</span>` : ''}
      </div>
      <div class="svc-actions">${actions}</div>
      <div class="log-viewer" id="logs-${escHtml(svc.name)}" style="display:none"></div>
    </div>
  `;
}

async function svcAction(name, action) {
  try {
    const res = await fetch(`/api/services/${encodeURIComponent(name)}/${action}`, { method: 'POST' });
    const data = await res.json();
    // Refresh services after a short delay
    setTimeout(fetchServices, 600);
  } catch (e) {
    console.error('Service action failed:', e);
  }
}

function toggleLogs(name) {
  const el = document.getElementById('logs-' + name);
  if (!el) return;
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : 'block';

  if (!visible) {
    // Start polling logs
    fetchLogs(name);
    logPollers[name] = setInterval(() => fetchLogs(name), 2000);
  } else {
    // Stop polling
    clearInterval(logPollers[name]);
    delete logPollers[name];
  }
}

async function fetchLogs(name) {
  try {
    const res = await fetch(`/api/services/${encodeURIComponent(name)}/logs`);
    const data = await res.json();
    const el = document.getElementById('logs-' + name);
    if (!el) return;
    el.innerHTML = (data.logs || []).slice(-100).map(l =>
      `<div class="log-line ${escHtml(l.stream)}">${new Date(l.ts).toLocaleTimeString()} ${escHtml(l.msg)}</div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
  } catch (e) { /* ignore */ }
}

function formatUptime(seconds) {
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}

// ─── Scan Tab ──────────────────────────────────────────────────

function renderScan() {
  if (!scanSummary) return '<div class="loading">Loading scan data...</div>';
  const s = scanSummary;
  return `
    <div class="scan-banner">
      <div class="scan-card p0"><div class="label">P0 Critical</div><div class="value">${s.remaining.P0}</div></div>
      <div class="scan-card p1"><div class="label">P1 High</div><div class="value">${s.remaining.P1}</div></div>
      <div class="scan-card p2"><div class="label">P2 Medium</div><div class="value">${s.remaining.P2}</div></div>
      <div class="scan-card resolved"><div class="label">Resolved</div><div class="value">${s.resolved.total}</div></div>
      <div class="scan-card total"><div class="label">Total Found</div><div class="value">${s.totals.total}</div></div>
    </div>
    <h3 style="margin-bottom:12px;font-size:14px;color:var(--text-dim)">Clean Repos (${s.cleanRepos.length})</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      ${s.cleanRepos.map(r => `<span class="badge badge-clean">${escHtml(r)}</span>`).join('')}
    </div>
    <h3 style="margin-bottom:12px;font-size:14px;color:var(--text-dim)">Affected Repos (${s.affectedRepos.length})</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      ${s.affectedRepos.map(r => {
        const count = getRepoIssueCount(r);
        return `<span class="badge badge-issues">${escHtml(r)} (${count})</span>`;
      }).join('')}
    </div>
    <h3 style="margin-bottom:12px;font-size:14px;color:var(--text-dim)">All Findings</h3>
    ${renderBacklogTable(backlog)}
  `;
}

// ─── Backlog Tab ───────────────────────────────────────────────

function renderBacklog() {
  const filtered = filterBacklog(backlog);
  return `
    <div class="filter-bar">
      <span style="font-size:12px;color:var(--text-dim);margin-right:4px">Filter:</span>
      ${['all','open','resolved','P0','P1','P2','P3'].map(f =>
        `<button class="filter-btn ${backlogFilter===f?'active':''}" onclick="setFilter('${f}')">${f}</button>`
      ).join('')}
      <span style="margin-left:auto;font-size:12px;color:var(--text-dim)">${filtered.length} items</span>
    </div>
    ${renderBacklogTable(filtered)}
  `;
}

function filterBacklog(items) {
  if (backlogFilter === 'all') return items;
  if (backlogFilter === 'open' || backlogFilter === 'resolved') return items.filter(b => b.status === backlogFilter);
  return items.filter(b => b.severity === backlogFilter);
}

function setFilter(f) {
  backlogFilter = f;
  render();
}

function renderBacklogTable(items) {
  return `
    <table class="backlog-table">
      <thead><tr><th>ID</th><th>Sev</th><th>Cat</th><th>Repo</th><th>Issue</th><th>Status</th></tr></thead>
      <tbody>
        ${items.map(b => {
          const cat = b.category || '—';
          const catClass = cat === 'security' ? 'cat-security' : cat === 'bug' ? 'cat-bug' : cat === 'accessibility' ? 'cat-accessibility' : cat === 'reliability' ? 'cat-reliability' : 'cat-quality';
          return `
          <tr>
            <td>${escHtml(b.id)}</td>
            <td class="sev-${escHtml(b.severity)}">${escHtml(b.severity)}</td>
            <td><span class="category-badge ${catClass}">${escHtml(cat)}</span></td>
            <td>${escHtml(b.repo)}</td>
            <td>${escHtml(b.title)}</td>
            <td class="status-${escHtml(b.status)}">${escHtml(b.status)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ─── Detail Panel & Health Checks ──────────────────────────────

async function runHealth(name, btn) {
  btn.className = 'btn running';
  btn.textContent = 'Running...';
  try {
    const res = await fetch(`/api/repos/${encodeURIComponent(name)}/health`);
    const data = await res.json();
    btn.className = `btn ${data.status === 'pass' ? 'pass' : 'fail'}`;
    btn.textContent = data.status === 'pass' ? '✓ Pass' : '✗ Fail';
    if (data.status !== 'pass') {
      showDetail(name, `<h3>Health Check — ${escHtml(data.status)}</h3><pre style="white-space:pre-wrap;font-size:12px;color:var(--text-dim)">${escHtml(data.stdout || data.error || '')}</pre>`);
    }
  } catch (e) {
    btn.className = 'btn fail';
    btn.textContent = '✗ Error';
  }
}

async function showLog(name) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('detailTitle').textContent = name + ' — Git Log';
  document.getElementById('detailContent').innerHTML = '<div class="loading">Loading...</div>';
  panel.classList.add('open');
  try {
    const res = await fetch(`/api/repos/${encodeURIComponent(name)}/log`);
    const data = await res.json();
    document.getElementById('detailContent').innerHTML = (data.log || [])
      .map(l => `<div class="log-entry">${escHtml(l)}</div>`).join('');
  } catch (e) {
    document.getElementById('detailContent').innerHTML = `Error: ${escHtml(e.message)}`;
  }
}

function showDetail(title, html) {
  document.getElementById('detailTitle').textContent = title;
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── Init ──────────────────────────────────────────────────────

fetchRepos();
fetchBacklog();
fetchScanSummary();
fetchServices();
fetchSystemInfo();

// Auto-refresh every 30s
setInterval(() => { fetchRepos(); fetchBacklog(); fetchScanSummary(); fetchServices(); fetchSystemInfo(); }, 30000);
</script>
